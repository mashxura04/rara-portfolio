
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060608;
      --surface: #0f0f12;
      --border: #1c1c22;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #7c6ef2;
      --font-display: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
      --radius: 12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 30px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    
    .cert-header {
      margin-bottom: 30px;
    }
    .cert-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .cert-sub {
      font-size: 1.1rem;
      color: var(--accent);
    }
    
    .cert-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .cert-images img {
      max-width: 100%;
      max-height: 250px;       /* Keeps them readable but not huge */
      width: auto;
      height: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      object-fit: contain;
      background: var(--surface);
      margin: 0 auto;          /* Centers the image */
      display: block;
    }
    .cert-context {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .cert-context strong { color: var(--text); }
    
    @media (max-width: 600px) {
      .cert-title { font-size: 1.6rem; }
      .cert-images { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
   <!-- BACK BUTTON FIXED -->
   <a href="index.html" id="back-btn" style="color: var(--text-muted); text-decoration: none; font-size: 1.2rem; transition: color 0.2s; display: inline-block; margin-bottom: 30px;">← Back</a>
    
    <div id="cert-content">
      <!-- Content will be loaded by JavaScript -->
    </div>
  </div>

    const id = params.get('id');
    if (id) {
      sessionStorage.setItem('return_to_cert', id);
    }

    // --- 2. FORCE THE BACK BUTTON TO RE-SAVE THE ID ON CLICK ---
    document.getElementById('back-btn').addEventListener('click', function(e) {
      if (id) {
        sessionStorage.setItem('return_to_cert', id);
      }
      // Let the link navigate naturally
    });

    // --- 3. LOAD THE CERTIFICATE DATA ---
    const certData = [

     {
  id: 1,

  context: "<strong>About this certificate:</strong><br><br>I took part in <a href='https://technovationchallenge.org/' target='_blank' style='color: var(--accent);'>Technovation Girls</a> as both the team leader and the person handling the technical side of the project. <br><br>My role was to keep the team moving in the right direction while also making sure the product actually worked. We spent a lot of time shaping the idea, building the platform, and fixing problems along the way. Our project, <em>SyneX (Bukhara) </em>, received a special nomination award supported by <a href='https://uz.usembassy.gov/' target='_blank' style='color: var(--accent);'>the Embassy of the United States in Uzbekistan</a> at the end, which made the experience even more meaningful."

{

  ],
  context: "<strong>About this:</strong><br><br>Throughout my academic journey, I have won in several English competitions at both national and international levels, and I have earned 1st and 2nd place awards in different Olympiads. My experience includes events such as the HIPPO English Language Olympiad, national spelling bee contests, and other large academic competitions focused on language and communication.<br><br>These competitions pushed me to keep improving, and performing under pressure. They are the reason how I seem more confident when competing with strong students from different backgrounds."

     {
  id: 8,
  title: "Founders Program",
  issuer: "Venture companies",
  images: [
    "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/founders.jpg"
  ],
  context: "<strong>About this:</strong><br><br>I was selected as one of the young founders in the <a href='https://t.me/bukhara_founders' target='_blank' style='color: var(--accent);'>Bukhara Founders Community</a>, a startup-focused program built to connect early-stage entrepreneurs and help them grow. During the program, I am attending sessions where experienced founders share their own journeys, including the founder of <a href='https://onless.uz' target='_blank' style='color: var(--accent);'>Onless.uz</a>, who spoke about building from zero and later securing about $45,000 in investment.<br><br>What I am getting from the program is a clearer view of how startups actually move forward, and how an idea becomes something people are willing to invest in. I hope,  it will help me to understand the space I want to be part of much better."

    ];

    const certId = parseInt(id);
    const cert = certData.find(c => c.id === certId);
    const content = document.getElementById('cert-content');

    if (cert) {
      let imagesHtml = cert.images.map(img => `<img src="${img}" alt="${cert.title}" />`).join('');
      
      content.innerHTML = `
        <div class="cert-header">
          <div class="cert-title">${cert.title}</div>
          <div class="cert-sub">${cert.issuer}</div>
        </div>
        <div class="cert-images">${imagesHtml}</div>
        <div class="cert-context">${cert.context}</div>
      `;
    } else {
      // This else statement prevents the blank screen you saw!
      content.innerHTML = `<p style="color:var(--text-muted);">Certificate not found (ID: ${id}). Please go back and try again.</p>`;
    }
  </script>
</body>
</html>
