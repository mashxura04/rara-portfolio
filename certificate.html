
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060608;
      --surface: #0f0f12;
      --border: #1c1c22;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #7c6ef2;
      --font-display: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
      --radius: 12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 30px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    
    .cert-header {
      margin-bottom: 30px;
    }
    .cert-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .cert-sub {
      font-size: 1.1rem;
      color: var(--accent);
    }
    
    .cert-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .cert-images img {
      max-width: 100%;
      max-height: 250px;       /* Keeps them readable but not huge */
      width: auto;
      height: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      object-fit: contain;
      background: var(--surface);
      margin: 0 auto;          /* Centers the image */
      display: block;
    }
    .cert-context {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .cert-context strong { color: var(--text); }
    
    @media (max-width: 600px) {
      .cert-title { font-size: 1.6rem; }
      .cert-images { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
   <!-- BACK BUTTON FIXED -->

    <div id="cert-content">
      <!-- Content will be loaded by JavaScript -->
    </div>

    const certId = parseInt(id);
    const cert = certData.find(c => c.id === certId);
    const content = document.getElementById('cert-content');

    if (cert) {
      let imagesHtml = cert.images.map(img => `<img src="${img}" alt="${cert.title}" />`).join('');
      
      content.innerHTML = `
        <div class="cert-header">
          <div class="cert-title">${cert.title}</div>
          <div class="cert-sub">${cert.issuer}</div>
        </div>
        <div class="cert-images">${imagesHtml}</div>
        <div class="cert-context">${cert.context}</div>
      `;
    } else {
      // This else statement prevents the blank screen you saw!
      content.innerHTML = `<p style="color:var(--text-muted);">Certificate not found (ID: ${id}). Please go back and try again.</p>`;
    }
  </script>
</body>
</html>
