<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ... (keep all existing styles) ... */
  </style>
</head>
<body>
  <div class="container">
   <!-- BACK BUTTON FIXED - points to experience section -->
   <a href="index.html#experience" id="back-btn" style="color: var(--text-muted); text-decoration: none; font-size: 1.2rem; transition: color 0.2s; display: inline-block; margin-bottom: 30px;">← Back to Portfolio</a>
    
    <div id="cert-content">
      <!-- Content will be loaded by JavaScript -->
    </div>
  </div>

  <script>
    // --- GET CERTIFICATE ID FROM URL ---
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      sessionStorage.setItem('return_to_cert', id);
    }

    // --- FORCE BACK BUTTON TO SAVE ID ---
    document.getElementById('back-btn').addEventListener('click', function(e) {
      if (id) {
        sessionStorage.setItem('return_to_cert', id);
      }
    });

    // --- CERTIFICATE DATA ---
    const certData = [
      {
        id: 1,
        title: "Innovation & Entrepreneurship",
        issuer: "BPS Hackathon",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/bps.jpg"
        ],
        context: "<strong>About this certificate:</strong> During the hackathon, our team created MediCard. A digital healthcare platform designed to eliminate paper medical records and simplify diagnostics, prescriptions, and doctor appointments. Within a limited timeframe, we went through brainstorming, product development, and solution building while working in a highly competitive environment. Our work was recognized with an achievement award, and we earned a FREEE voucher to participate in entrepreneurship programs organized by <a href='https://startupgarage.uz/en/portfolio#tab8' target='_blank' style='color: var(--accent);'>Startup Garage</a>.<br><br><a href='https://t.me/Elevate_hackathon' target='_blank' style='color: var(--accent);'>Click here to view the experience.</a>"

      {
        id: 2,
        title: "Technovation Girls Program",
        issuer: "Technovation Girls",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/technovationgirls.jpg"
        ],
        context: "<strong>About this certificate:</strong> As both the team leader and the member responsible for technical development, I guided my team through the process of transforming an idea into a working product while building Budgetravel. A web application designed to help users plan affordable and budget-friendly travel experiences. I led coordination within the team while also handling the technical implementation of the platform, ensuring that our concept became a functional solution. Our project, SyneX (Bukhara) — Budgetravel, was recognized with a special nomination award supported by <a href='https://uz.usembassy.gov/' target='_blank' style='color: var(--accent);'>the Embassy of the United States in Uzbekistan</a> during <a href='https://technovationchallenge.org/' target='_blank' style='color: var(--accent);'>Technovation Girls</a>, recognizing our innovation in entrepreneurship, financial literacy, and impactful problem-solving."
      },
      {
        id: 3,
        title: "Startup Fest Pitch",
        issuer: "Start-up Fest",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/pitch.jpg"
        ],
        context: "<strong>About this certificate:</strong> I pitched my project in front of <a href='https://www.linkedin.com/in/azizbek-kurbonov' target='_blank' style='color: var(--accent);'>Azizbek Kurbanov</a> in <a href='https://www.startupfest.uz/' target='_blank' style='color: var(--accent);'>Start-up Fest by Youth Affairs</a>, gaining firsthand experience presenting innovative ideas in a real entrepreneurial environment. I focused on communicating the value, impact, and vision behind the project while answering questions and presenting under pressure. My presentation was recognized individually, and I received the Best Pitch Nomination, highlighting my ability to communicate ideas persuasively and confidently in front of experienced startup professionals."
      },
      {
        id: 4,
        title: "Budgetravel — My First Startup Platform",
        issuer: "My company",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/project.png"
        ],
        context: "<strong>About this certificate:</strong> I am currently developing Budgetravel, a travel-tech startup designed to make tourism in Uzbekistan more authentic, affordable, and community-driven. Unlike traditional platforms such as Airbnb, Budgetravel focuses on connecting travelers directly with local families through cultural homestays, allowing visitors to experience real Uzbek hospitality while financially supporting local households. The platform also enables artisans to sell handmade products directly to customers and helps travelers discover affordable local restaurants where Uzbek families actually eat. All transactions are processed within the platform, operating on a commission-based model where Budgetravel takes a 10–15% service fee. I am independently handling the technical development of the platform while actively building the product during its seed stage and preparing for customer reach and market validation.<br><br><a href='https://budgetravel.uz/' target='_blank' style='color: var(--accent);'>Click here to SEEE IT..</a>"
      },
      {
        id: 5,
        title: "Sports Leadership & Teamwork",
        issuer: "Volleyball Club",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/sport.jpg"
        ],
        context: "<strong>About this certificate:</strong> For over four years, I was actively involved in athletics and volleyball, regularly participating in regional competitions and challenging myself in highly competitive environments. During this journey, I earned 2nd place in one of the regional volleyball competitions while consistently improving my performance and teamwork skills. Beyond competing, I also led my school volleyball club for several years, helping organize training sessions and guiding younger students as they learned and developed their skills. This experience taught me leadership and the importance of helping others grow as a team."
      },
      {
        id: 6,
        title: "Community Management",
        issuer: "Start-up Ambassadors",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/sth.jpg"
        ],
        context: "<strong>About this certificate:</strong> I serve as a Startup Ambassador for Gijduvan under Startup Ambassadors Uzbekistan, working to expand entrepreneurial culture in a city widely recognized for its strong business-driven mindset. Together with our regional community, <a href='https://t.me/sabukhara' target='_blank' style='color: var(--accent);'>SA Bukhara Community</a>, we organize monthly workshops where we share knowledge and practical insights gained from the <a href='https://www.startupambassadors.uz/' target='_blank' style='color: var(--accent);'> Startup Ambassadors</a> Winter Camp. My role focuses on contributing to the growth of future founders by creating learning opportunities and building a stronger startup ecosystem within the region. Currently, I am also developing a dedicated website for the Bukhara ambassador community to document events, manage registrations, and introduce interactive features that improve engagement within our growing network."
      },
      {
        id: 7,
        title: "Academic Excellence",
        issuer: "Olympiads",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/english.jpg"
        ],
        context: "<strong>About this certificate:</strong> Throughout my academic journey, I have participated in multiple prestigious English competitions at both national and international levels, earning 1st and 2nd place awards across a wide range of Olympiads. My achievements include competitions such as HIPPO English Language Olympiad, national spelling bee contests, and several large-scale academic competitions focused on language proficiency and communication skills. Competing in these environments allowed me to continuously challenge myself while developing advanced English proficiency, confidence, and the ability to perform consistently under competitive pressure."
      },
      {
        id: 8,
        title: "Founders Program",
        issuer: "Venture companies",
        images: [
          "https://raw.githubusercontent.com/mashxura04/rara-portfolio/main/founders.jpg"
        ],
        context: "<strong>About this certificate:</strong> I was selected as a young promising founder in <a href='https://t.me/bukhara_founders' target='_blank' style='color: var(--accent);'>Bukhara Founders Community</a>, a startup-focused ecosystem program designed to connect and develop early-stage entrepreneurs.During the program, I am attending sessions where experienced founders shared their journeys, including the founder of <a href='https://onless.uz' target='_blank' style='color: var(--accent);'>Onless.uz</a>, who explained his path from building from zero to securing approximately $45,000 in investment.Through these sessions, I am gaining practical insight into startup development, fundraising mindset, and real-world founder decision-making. The experience improves my understanding of how startups grow beyond ideas into investable products, and positioned me closer to a real entrepreneurial ecosystem."
      }
    ];

    const certId = parseInt(id);
    const cert = certData.find(c => c.id === certId);
    const content = document.getElementById('cert-content');

    if (cert) {
      let imagesHtml = cert.images.map(img => `<img src="${img}" alt="${cert.title}" />`).join('');
      
      content.innerHTML = `
        <div class="cert-header">
          <div class="cert-title">${cert.title}</div>
          <div class="cert-sub">${cert.issuer}</div>
        </div>
        <div class="cert-images">${imagesHtml}</div>
        <div class="cert-context">${cert.context}</div>
      `;
    } else {
      content.innerHTML = `<p style="color:var(--text-muted);">Certificate not found (ID: ${id}). Please go back and try again.</p>`;
    }
  </script>
</body>
</html>
